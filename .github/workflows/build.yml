name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # needed for creating releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o /tmp/gradle.zip
          unzip -q -d /tmp /tmp/gradle.zip
          echo "/tmp/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GearWise-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: GearWise-debug

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          name: "Latest Build"
          tag_name: "latest"
          body: |
            ## GearWise 最新构建版本

            这是 `main` 分支的最新自动构建版本。每次代码更新后自动编译。

            ### 下载安装
            点击下方的 **app-debug.apk** 下载，传到手机上直接安装。

            > 首次安装需要在手机「设置 → 安全」中开启「允许安装未知来源应用」。

            ### 构建信息
            - Commit: [`${{ steps.sha.outputs.short }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            ### 隐私提醒
            本应用完全离线运行，所有数据仅保存在你的设备上，不上传任何信息。
          files: app-debug.apk
          draft: false
          prerelease: false
